<main class="d-flex flex-nowrap">
<div class="container my-5">
    <h2 class="text-center">Create Customer</h2>
    <form id="createCustomerForm" method="POST" action="http://localhost:8080/api/customers">
        <div class="mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" name="email" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <div class="mb-3">
            <label for="customerKey" class="form-label">Customer Key</label>
            <input type="text" class="form-control" id="customerKey" name="customerKey" required>
        </div>
        <div class="mb-3">
            <label for="firstName" class="form-label">First Name</label>
            <input type="text" class="form-control" id="firstName" name="firstName" required>
        </div>
        <div class="mb-3">
            <label for="lastName" class="form-label">Last Name</label>
            <input type="text" class="form-control" id="lastName" name="lastName" required>
        </div>
        <div class="mb-3">
            <label for="country" class="form-label">Country</label>
            <input type="text" class="form-control" id="country" name="country" required>
        </div>
        <div class="mb-3">
            <button type="submit" class="btn btn-primary w-100">Create Customer</button>
        </div>
    </form>
</div>
