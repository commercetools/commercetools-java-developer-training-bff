<div class="container py-5">
    <div class="row h-100">
        <div class="col-md-12">

            <h2>Browse Products</h2>
            <br>
            <div class="accordion" id="productsForm">
                <div class="accordion-item">
                    <h2 class="accordion-header" id="form">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapse-form" aria-expanded="true" aria-controls="collapse-form" >
                            Enter details:
                        </button>
                    </h2>
                    <div id="collapse-form" class="accordion-collapse collapse show" aria-labelledby="form" data-bs-parent="#productsAccordion">
                        <div class="accordion-body">
                            <div class="d-flex justify-content-between">
                                <input type="text" class="form-control mb-2" id="keyword" placeholder="Enter the search term" />
                                <input type="text" class="form-control mb-2" id="store" placeholder="Select a store" />
                                <div class="form-check form-switch">
                                    <input type="checkbox" class="form-check-input mb-2" id="includeFacets" />
                                    <label class="form-check-label" for="facets">Include Facets</label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="accordion" id="productsAccordion">

                <div class="accordion-item">
                    <h2 class="accordion-header" id="task1">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapse1" aria-expanded="true" aria-controls="collapse1" >
                            1. A customer wants to search all products using a keyword.
                        </button>
                    </h2>
                    <div id="collapse1" class="accordion-collapse collapse show" aria-labelledby="task1" data-bs-parent="#productsAccordion">
                        <div class="accordion-body">
                            <div class="d-flex justify-content-between">
                                <span>GET /products?keyword=keyword</span>
                                <button class="btn btn-primary" onclick="getProducts()">Search</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="accordion-item">
                    <h2 class="accordion-header" id="task2">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapse2" aria-expanded="false" aria-controls="collapse2">
                            2. We need to display facets like color, finish etc.
                        </button>
                    </h2>
                    <div id="collapse2" class="accordion-collapse collapse" aria-labelledby="task2" data-bs-parent="#productsAccordion">
                        <div class="accordion-body">
                            <div class="d-flex justify-content-between">
                                <span>GET /products?facets=true</span>
                                <div>
                                    <button class="btn btn-primary" onclick="getProducts()">Display Facets</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="accordion-item">
                    <h2 class="accordion-header" id="task3">
                        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#collapse3" aria-expanded="false" aria-controls="collapse3">
                            3. A customer should select a store and see products offered in the store.
                        </button>
                    </h2>
                    <div id="collapse3" class="accordion-collapse collapse" aria-labelledby="task3" data-bs-parent="#productsAccordion">
                        <div class="accordion-body">
                            <div class="d-flex justify-content-between">
                                <span>GET /products?keyword=&storeKey=</span>
                                <div>
                                    <button class="btn btn-primary" onclick="getProducts()">Search</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <br/>
            <div>
                <strong>Output:</strong>
                <div id="results" class="mt-3 overflow-auto" style="max-height: 200px; max-width: 100%;"></div>
                <div id="facets" class="mt-3 overflow-auto" style="max-height: 200px; max-width: 100%;"></div>
            </div>
        </div>
    </div>
</div>

<script>
    function getProducts() {
        let keyword = document.getElementById('keyword').value.trim();
        const storeKey = document.getElementById('store').value.trim();
        const includeFacets = document.getElementById('includeFacets').checked;
        const resultsDiv = document.getElementById('results');
        const facetsDiv = document.getElementById('facets');

        resultsDiv.innerHTML = '';
        facetsDiv.innerHTML = '';

        let url = 'http://localhost:8080/api/products?';

        if (keyword) {
            url += `keyword=${keyword}`;
        }

        if (storeKey) {
            url += (url.includes('?') ? '&' : '') + `storeKey=${storeKey}`;
        }

        if (includeFacets) {
            url += (url.includes('?') ? '&' : '') + `facets=true`;
        }

        fetch(url)
            .then(response => response.json())
            .then(products => {
                // display the results
                console.log(products);
                if (products.results && products.results.length > 0) {
                    console.log(products.results);
                    products.results.forEach(result => {
                        console.log(result);
                        const productDiv = document.createElement('div');
                        productDiv.classList.add('product');
                        productDiv.innerHTML = `<br/><h3>${result.productProjection.name["en-US"]}</h3><br/>`;
                        if(result.matchingVariants.allMatched){
                            console.log("allMatched");
                            if(result.productProjection.masterVariant.sku){productDiv.innerHTML += `<p>${result.productProjection.masterVariant.sku}</p>`;}
                            if(result.productProjection.masterVariant.price){productDiv.innerHTML += `<p>${result.productProjection.masterVariant.price.value.currencyCode} ${(result.productProjection.masterVariant.price.value.centAmount / 100).toFixed(2)}</p>`;}
                            if(result.productProjection.masterVariant.images[0].url){productDiv.innerHTML += `<img src="${result.productProjection.masterVariant.images[0].url}" class="img-fluid d-block mx-auto"  width="300" height="200" />`;}
                            if (result.productProjection.variants.length > 0) {
                                result.productProjection.variants.forEach(variant => {
                                    console.log((variant.price.value.centAmount / 100).toFixed(2));
                                    if (variant.sku){productDiv.innerHTML += `<p> SKU: ${variant.sku}</p>`;}
                                    if (variant.price){productDiv.innerHTML += `<p>Price: ${variant.price.value.currencyCode} ${(variant.price.value.centAmount / 100).toFixed(2)}</p>`;}
                                    if (variant.images[0].url){productDiv.innerHTML += `<img src="${variant.images[0].url}" class="img-fluid d-block mx-auto" width="300" height="200" />`;}
                                });
                            }
                        }

                        resultsDiv.appendChild(productDiv);
                    });
                } else {
                    resultsDiv.innerHTML = 'No products found.';
                }
                if (products.facets && products.facets.length > 0) {
                    products.facets.forEach(facet => {
                        const facetDiv = document.createElement('div');
                        facetDiv.classList.add('facet');
                        facetDiv.innerHTML = `<br/><h3>${facet.name}</h3><br/>`
                            if (facet.buckets && facet.buckets.length > 0) {
                                facet.buckets.forEach(bucket => {
                                    facetDiv.innerHTML += `<p>${bucket.key} ${bucket.count}</p>`;
                                });
                            }
                        facetsDiv.appendChild(facetDiv);
                    });
                } else {
                    facetsDiv.innerHTML = 'No facets.';
                }
            })
            .catch(error => {
                resultsDiv.innerHTML = 'Error getting data from backend.';
                console.error('Error getting products:', error);
            });
    }
</script>
